        voice_character_id: null
      - text: 「力を少しだけほどいたよ。あとは、ケンちゃんたちの番や」
        voice_character_id: char_obachan
      - text: おばちゃんは、ちいさなおふだと不思議なアメをケンの手に握らせた。
        voice_character_id: null
      - text: 「ふふ。アメちゃんは、こわい時に効くんだよ」
        voice_character_id: char_obachan
      - text: 「ケン、行ける？」
