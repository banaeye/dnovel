      - text: その場に、おじさんがぼんやりと立っていた。
        voice_character_id: null
      - text: 「おじさん……？」
        voice_character_id: char_hero
      - text: 「おお、ケンちゃんか。ここは……普通じゃないな。普通じゃない一番街は、ろくなことにならん」
