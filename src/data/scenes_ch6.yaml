        voice_character_id: char_yui
      - text: 館長はうなずこうとして、苦しそうに目を閉じた。
        voice_character_id: null
      - text: 「田村さんの声を、信じなさい。彼女はまだ、完全には呑まれていない」
        voice_character_id: char_museum_director
      - text: 霧の向こうで、今までとは違う巨大な影がゆっくり立ち上がった。
