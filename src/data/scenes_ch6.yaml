      - text: けれど、外へ弾き出されることはなかった。13階の霧が、静かに渦を巻いている。
        voice_character_id: null
      - text: 「ケン！」
        voice_character_id: char_yui
      - text: 「……だいじょうぶやで」
        voice_character_id: char_obachan
      - text: 霧の中に、おばちゃんが現れた。
        voice_character_id: null
      - text: 「おばちゃん……」
