locations:
  - id: loc_danchi
    name: "赤羽団地"
    description: "ケンが住んでいる団地。昔からの住棟が並んでいる。"
    background_default: backgrounds/danchi_day.jpg
    default_commands:
      - cmd_examine
      - cmd_talk
      - cmd_move
      - cmd_inventory
    connections:
      - location_id: loc_station
        label: "赤羽駅前へ"
        condition:
          flag: flag_chapter
          value: 5
          negate: true
      - location_id: loc_slope
        label: "団地への坂へ"
        condition:
          and:
            - or:
                - flag: flag_visited_slope
                  value: true
                - flag: flag_chapter
                  value: 4
            - flag: flag_chapter
              value: 5
              negate: true
      - location_id: loc_museum
        label: "団地のミュージアムへ"
        condition:
          flag: flag_ch3_museum_unlocked
          value: true
      - location_id: loc_plum_park
        label: "梅の木公園へ"
        condition:
          flag: flag_ch4_detective_clue2
          value: true
    entry_scene: scene_danchi_morning

  - id: loc_station
    name: "赤羽駅前"
    description: "JR赤羽駅の改札前。商店街への入り口でもある。"
    background_default: backgrounds/station_day.jpg
    default_commands:
      - cmd_examine
      - cmd_talk
      - cmd_move
      - cmd_inventory
    connections:
      - location_id: loc_danchi
        label: "団地へ戻る"
        condition: null
      - location_id: loc_ichibangai
        label: "一番街入口へ"
        condition:
          flag: flag_chapter
          value: 3
          negate: true
      - location_id: loc_arcade
        label: "アーケード街へ"
        condition:
          or:
            - flag: flag_chapter
              value: 3
            - flag: flag_chapter
              value: 4
      - location_id: loc_coderdojo
        label: "CoderDojo赤羽へ"
        condition:
          flag: flag_station_explored
          value: true
      - location_id: loc_slope
        label: "団地への坂へ"
        condition:
          flag: flag_chapter
          value: 4
      - location_id: loc_slope
        label: "団地への坂へ"
        condition:
          flag: flag_chapter
          value: 6
      - location_id: loc_station_end
        label: "駅の端へ"
        condition:
          or:
            - has_item: item_gummy_2
            - flag: flag_chapter
              value: 6
      - location_id: loc_park
        label: "赤羽公園へ"
        condition:
          or:
            - flag: flag_ch4_detective_clue4
              value: true
            - flag: flag_chapter
              value: 6
    entry_scene: scene_station_default

  - id: loc_coderdojo
    name: "CoderDojo赤羽"
    description: "子どもたちが毎月集まってプログラミングを楽しむ場所。"
    background_default: backgrounds/coderdojo.jpg
    default_commands:
      - cmd_examine
      - cmd_talk
      - cmd_move
      - cmd_inventory
    connections:
      - location_id: loc_station
        label: "駅前へ戻る"
        condition: null
      - location_id: loc_slope
        label: "団地への坂へ"
        condition:
          or:
            - and:
                - flag: flag_met_mentor
                  value: true
                - flag: flag_examined_whiteboard
                  value: true
                - flag: flag_examined_kids
                  value: true
            - flag: flag_chapter
              value: 4
            - flag: flag_chapter
              value: 6
    entry_scene: scene_coderdojo_default

  - id: loc_ichibangai
    name: "一番街入口"
    description: "赤羽一番街商店街への入り口。昔ながらのアーケードが続く。"
    background_default: backgrounds/ichibangai.jpg
    default_commands:
      - cmd_examine
      - cmd_talk
      - cmd_move
      - cmd_inventory
    connections:
      - location_id: loc_station
        label: "駅前へ戻る"
        condition: null
    entry_scene: scene_ichibangai_default

  - id: loc_arcade
    name: "アーケード街"
    description: "駅前から続く古いアーケード街。昼でも照明がちらつき、通りの奥が見えない。"
    background_default: backgrounds/intersection.jpg
    default_commands:
      - cmd_examine
      - cmd_talk
      - cmd_move
      - cmd_inventory
    connections:
      - location_id: loc_station
        label: "駅前へ戻る"
        condition: null
      - location_id: loc_park
        label: "公園へ"
        condition:
          or:
            - flag: flag_ch3_ticket_stolen
              value: true
            - flag: flag_chapter
              value: 4
    entry_scene: scene_arcade_default

  - id: loc_park
    name: "赤羽公園"
    description: "駅前から少し歩いたところにある公園。ベンチと遊具のまわりに子どもたちの声が響く。"
    background_default: backgrounds/danchimae.jpg
    default_commands:
      - cmd_examine
      - cmd_talk
      - cmd_move
      - cmd_inventory
    connections:
      - location_id: loc_arcade
        label: "アーケード街へ戻る"
        condition:
          or:
            - flag: flag_ch3_ticket_stolen
              value: true
              negate: true
            - flag: flag_ch3_ticket_recovered
              value: true
      - location_id: loc_station
        label: "駅前へ"
        condition:
          or:
            - flag: flag_ch3_ticket_stolen
              value: true
              negate: true
            - flag: flag_ch3_ticket_recovered
              value: true
    entry_scene: scene_park_default

  - id: loc_museum
    name: "団地のミュージアム"
    description: "団地の一角にある小さなミュージアム。地域の歴史が展示されている。"
    background_default: backgrounds/coderdojo.jpg
    default_commands:
      - cmd_examine
      - cmd_talk
      - cmd_move
      - cmd_inventory
    connections:
      - location_id: loc_danchi
        label: "団地へ戻る"
        condition: null
    entry_scene: scene_museum_default

  - id: loc_museum_core
    name: "ミュージアム中心部"
    description: "三つの展示室へ続く円形ホール。床に淡い光の線が走っている。"
    background_default: backgrounds/center_musium.png
    default_commands:
      - cmd_talk
      - cmd_move
      - cmd_inventory
    connections:
      - location_id: loc_museum_history_room
        label: "「赤羽の歴史」の部屋へ"
        condition:
          flag: flag_chapter
          value: 5
      - location_id: loc_museum_portrait_room
        label: "「人々の肖像」の部屋へ"
        condition:
          flag: flag_chapter
          value: 5
      - location_id: loc_museum_storage_room
        label: "「収蔵庫」の部屋へ"
        condition:
          flag: flag_chapter
          value: 5
    entry_scene: scene_museum_core_default

  - id: loc_museum_history_room
    name: "赤羽の歴史の部屋"
    description: "赤羽の古い写真や年表が並ぶ展示室。"
    background_default: backgrounds/musium_room01.jpg
    default_commands:
      - cmd_move
      - cmd_inventory
    connections:
      - location_id: loc_museum_core
        label: "中心部へ戻る"
        condition:
          flag: flag_chapter
          value: 5
    entry_scene: scene_museum_history_room_default

  - id: loc_museum_portrait_room
    name: "人々の肖像の部屋"
    description: "赤羽に暮らしてきた人々の肖像が並ぶ展示室。"
    background_default: backgrounds/musium_room01.jpg
    default_commands:
      - cmd_move
      - cmd_inventory
    connections:
      - location_id: loc_museum_core
        label: "中心部へ戻る"
        condition:
          flag: flag_chapter
          value: 5
    entry_scene: scene_museum_portrait_room_default

  - id: loc_museum_storage_room
    name: "収蔵庫"
    description: "展示されていない品物が静かにしまわれている部屋。"
    background_default: backgrounds/musium_room01.jpg
    default_commands:
      - cmd_move
      - cmd_inventory
    connections:
      - location_id: loc_museum_core
        label: "中心部へ戻る"
        condition:
          flag: flag_chapter
          value: 5
    entry_scene: scene_museum_storage_room_default

  - id: loc_museum_deep_core
    name: "ミュージアム奥の中心部"
    description: "入口側とよく似た円形ホール。壁の赤い光は、前よりも濃く脈打っている。"
    background_default: backgrounds/center_musium.png
    default_commands:
      - cmd_move
      - cmd_inventory
    connections:
      - location_id: loc_museum_yui_room
        label: "「記憶の展示室」へ"
        condition:
          flag: flag_chapter
          value: 5
      - location_id: loc_museum_oyaji_room
        label: "「アメちゃん展示室」へ"
        condition:
          flag: flag_chapter
          value: 5
    entry_scene: scene_museum_deep_core_default

  - id: loc_museum_yui_room
    name: "記憶の展示室"
    description: "小さな絵が壁一面に並ぶ、静かな展示室。"
    background_default: backgrounds/musium_room01.jpg
    default_commands:
      - cmd_move
      - cmd_inventory
    connections:
      - location_id: loc_museum_deep_core
        label: "奥の中心部へ戻る"
        condition:
          flag: flag_chapter
          value: 5
    entry_scene: scene_museum_yui_room_default

  - id: loc_museum_oyaji_room
    name: "アメちゃん展示室"
    description: "懐かしいアメ菓子の包み紙や道具が並ぶ展示室。床の赤い光が妙に速い。"
    background_default: backgrounds/musium_room01.jpg
    default_commands:
      - cmd_move
      - cmd_inventory
    connections:
      - location_id: loc_museum_deep_core
        label: "奥の中心部へ戻る"
        condition:
          flag: flag_chapter
          value: 5
    entry_scene: scene_museum_oyaji_room_default

  - id: loc_slope
    name: "団地への坂"
    description: "CoderDojoから団地へ続く緩やかな坂道。赤羽の街が見渡せる。"
    background_default: backgrounds/slope_day.jpg
    default_commands:
      - cmd_examine
      - cmd_talk
      - cmd_move
      - cmd_inventory
    connections:
      - location_id: loc_coderdojo
        label: "CoderDojoへ戻る"
        condition: null
      - location_id: loc_station
        label: "駅前へ下る"
        condition:
          or:
            - flag: flag_chapter
              value: 4
            - flag: flag_chapter
              value: 6
      - location_id: loc_danchi
        label: "団地へ上る"
        condition: null
    entry_scene: scene_slope_default

  - id: loc_plum_park
    name: "梅の木公園"
    description: "団地の脇にある小さな公園。古い梅の木が一本だけ立っている。"
    background_default: backgrounds/umenoki_park.jpg
    default_commands:
      - cmd_examine
      - cmd_talk
      - cmd_move
      - cmd_inventory
    connections:
      - location_id: loc_danchi
        label: "団地へ戻る"
        condition: null
    entry_scene: scene_plum_park_default

  - id: loc_station_end
    name: "駅の端"
    description: "赤羽駅のホームの端。人が少なく、ひっそりしている。"
    background_default: backgrounds/ekihaji.jpg
    default_commands:
      - cmd_examine
      - cmd_talk
      - cmd_move
      - cmd_inventory
    connections:
      - location_id: loc_station
        label: "駅前へ戻る"
        condition: null
    entry_scene: scene_station_end_default
