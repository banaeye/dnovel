      - text: 「ケン……！　よかった、出てきた」
        voice_character_id: char_yui
      - text: 「ごめん……追い返されちゃった」
        voice_character_id: char_hero
      - text: 「……もう一回、行く？」
        voice_character_id: char_yui
      - text: 「うん。もう一回」
