scenes:
  # ============================================================
  # 第4章　開幕
  # ============================================================
  - id: scene_ch4_start
    location_id: loc_danchi
    background: backgrounds/danchimae.jpg
    bgm: audio/bgm/danchi.mp3
    flags_set:
      - flag: flag_chapter
        value: 4
      - flag: flag_chapter1_cleared
        value: true
      - flag: flag_ch2_cleared
        value: true
      - flag: flag_ch3_cleared
        value: true
    messages:
      - text: 第4章
        voice_character_id: null
    next_scene: scene_ch4_monologue

  - id: scene_ch4_monologue
    location_id: loc_danchi
    background: backgrounds/danchimae.jpg
    bgm: audio/bgm/danchi.mp3
    messages:
      - text: 五月晴れ。
        voice_character_id: null
      - text: 雲ひとつない青い空に、新緑のにおいが混じっている。
        voice_character_id: null
      - text: アメちゃん大会からしばらく経った。今日は特に予定もない。
        voice_character_id: null
      - text: こんな日は、赤羽をぶらぶらしてみようか。
        voice_character_id: char_hero
    next_scene: scene_ch4_obachan_knee

  - id: scene_ch4_obachan_knee
    location_id: loc_danchi
    background: backgrounds/danchimae.jpg
    bgm: audio/bgm/danchi.mp3
    flags_set:
      - flag: flag_ch4_obachan_knee_heard
        value: true
    characters:
      - character_id: char_obachan
        position: left
        expression: normal
      - character_id: char_hero
        position: right
        expression: normal
    messages:
      - text: 広場に出ると、田村のおばちゃんがベンチに座っていた。
        voice_character_id: null
      - text: 「あら、ケンちゃん。ちょうどよかった」
        voice_character_id: char_obachan
      - text: 「どうしたんですか、おばちゃん」
        voice_character_id: char_hero
      - text: 「最近、膝がねえ……ずっと痛いんだよ。来年のアメちゃん大会、出れるかどうか分からなくなっちゃって」
        voice_character_id: char_obachan
      - text: 「え……」
        voice_character_id: char_hero
      - text: 「今年みんなと走れたのは良かったけどねえ。来年も走れたらいいなあと思ってたんだけど」
        voice_character_id: char_obachan
      - text: おばちゃんは遠くを見て、静かに笑った。
        voice_character_id: null
      - text: （なんとかしてあげたいけど……）
        voice_character_id: char_hero
    next_scene: null

  # ============================================================
  # ロケーション入口シーン（全ロケーション分・章単独動作のため必須）
  # ============================================================
  - id: scene_danchi_morning
    location_id: loc_danchi
    background: backgrounds/danchimae.jpg
    bgm: audio/bgm/danchi.mp3
    messages: []
    talkable:
      - character_id: char_obachan
        scene_id: scene_ch4_talk_obachan
    branches:
      type: auto
      choices:
        - condition:
            and:
              - has_item: item_gummy_1
              - has_item: item_gummy_2
              - has_item: item_gummy_3
              - has_item: item_gummy_4
              - has_item: item_gummy_5
              - has_item: item_gummy_6
              - has_item: item_gummy_7
          next_scene: scene_ch4_wish
        - condition:
            and:
              - has_item: item_gummy_1
              - has_item: item_gummy_2
              - has_item: item_gummy_3
              - has_item: item_gummy_4
              - has_item: item_gummy_5
              - has_item: item_gummy_6
              - flag: flag_ch4_obachan_knee_heard
                value: true
          next_scene: scene_ch4_hint_seven
        - condition:
            flag: flag_ch4_obachan_knee_heard
            value: true
          next_scene: null
        - condition: null
          next_scene: scene_ch4_monologue

  - id: scene_station_default
    location_id: loc_station
    background: backgrounds/akabane.jpg
    bgm: audio/bgm/station.mp3
    messages: []
    branches:
      type: auto
      choices:
        - condition:
            flag: flag_ch4_gummy_quest
            value: true
          next_scene: null
        - condition: null
          next_scene: scene_ch4_station_hint

  - id: scene_ch4_station_hint
    location_id: loc_station
    background: backgrounds/akabane.jpg
    bgm: audio/bgm/station.mp3
    messages:
      - text: 駅前に出てきた。どこかに行ってみようかな。
        voice_character_id: char_hero
    next_scene: null

  - id: scene_coderdojo_default
    location_id: loc_coderdojo
    background: backgrounds/coderdojo.jpg
    bgm: audio/bgm/station.mp3
    messages:
      - text: 今日はCoderDojoの日じゃない。
        voice_character_id: char_hero
    next_scene: null

  - id: scene_ichibangai_default
    location_id: loc_ichibangai
    background: backgrounds/ichibangai.jpg
    bgm: audio/bgm/station.mp3
    messages:
      - text: 一番街の入口。懐かしいな。
        voice_character_id: char_hero
    next_scene: null

  - id: scene_arcade_default
    location_id: loc_arcade
    background: backgrounds/archade.jpg
    bgm: audio/bgm/station.mp3
    messages: []
    talkable:
      - character_id: char_oyaji
        scene_id: scene_ch4_arcade_oyaji
        condition:
          flag: flag_ch4_gummy_quest
          value: true
    branches:
      type: auto
      choices:
        - condition:
            has_item: item_gummy_6
          next_scene: null
        - condition:
            flag: flag_ch4_gummy_quest
            value: true
          next_scene: null
        - condition: null
          next_scene: scene_ch4_arcade_no_quest

  - id: scene_ch4_arcade_no_quest
    location_id: loc_arcade
    background: backgrounds/archade.jpg
    bgm: audio/bgm/station.mp3
    messages:
      - text: アーケード街。あのアメちゃん大会が懐かしい。
        voice_character_id: char_hero
    next_scene: null

  - id: scene_park_default
    location_id: loc_park
    background: backgrounds/danchimae.jpg
    bgm: audio/bgm/danchi.mp3
    messages:
      - text: 公園。今日はのんびりした雰囲気だ。
        voice_character_id: char_hero
    next_scene: null

  - id: scene_museum_default
    location_id: loc_museum
    background: backgrounds/coderdojo.jpg
    bgm: audio/bgm/danchi.mp3
    messages: []
    talkable:
      - character_id: char_museum_staff
        scene_id: scene_ch4_museum_staff
        condition:
          flag: flag_ch4_gummy_quest
          value: true
    branches:
      type: auto
      choices:
        - condition:
            has_item: item_gummy_3
          next_scene: null
        - condition:
            flag: flag_ch4_gummy_quest
            value: true
          next_scene: null
        - condition: null
          next_scene: scene_ch4_museum_no_quest

  - id: scene_ch4_museum_no_quest
    location_id: loc_museum
    background: backgrounds/coderdojo.jpg
    bgm: audio/bgm/danchi.mp3
    messages:
      - text: 団地のミュージアム。今日は特に用事はない。
        voice_character_id: char_hero
    next_scene: null

  - id: scene_slope_default
    location_id: loc_slope
    background: backgrounds/slope_day.jpg
    bgm: audio/bgm/danchi.mp3
    messages: []
    talkable:
      - character_id: char_college_student
        scene_id: scene_ch4_slope_college
    branches:
      type: auto
      choices:
        - condition:
            flag: flag_ch4_gummy_quest
            value: true
          next_scene: null
        - condition: null
          next_scene: scene_ch4_slope_first

  - id: scene_ch4_slope_first
    location_id: loc_slope
    background: backgrounds/slope_day.jpg
    bgm: audio/bgm/danchi.mp3
    messages:
      - text: 団地への坂道。風が気持ちいい。
        voice_character_id: char_hero
    next_scene: null

  - id: scene_plum_park_default
    location_id: loc_plum_park
    background: backgrounds/danchimae.jpg
    bgm: audio/bgm/danchi.mp3
    messages: []
    talkable:
      - character_id: char_candy_kid
        scene_id: scene_ch4_plum_park_talk
        condition:
          flag: flag_ch4_gummy_quest
          value: true
    branches:
      type: auto
      choices:
        - condition:
            has_item: item_gummy_2
          next_scene: null
        - condition:
            flag: flag_ch4_gummy_quest
            value: true
          next_scene: null
        - condition: null
          next_scene: scene_ch4_plum_park_no_quest

  - id: scene_ch4_plum_park_no_quest
    location_id: loc_plum_park
    background: backgrounds/danchimae.jpg
    bgm: audio/bgm/danchi.mp3
    messages:
      - text: 梅の木公園。古い梅の木が一本、静かに立っている。
        voice_character_id: char_hero
    next_scene: null

  - id: scene_station_end_default
    location_id: loc_station_end
    background: backgrounds/akabane.jpg
    bgm: audio/bgm/station.mp3
    messages: []
    talkable:
      - character_id: char_detective
        scene_id: scene_ch4_detective
    branches:
      type: auto
      choices:
        - condition:
            has_item: item_gummy_4
          next_scene: null
        - condition:
            flag: flag_ch4_gummy_quest
            value: true
          next_scene: null
        - condition: null
          next_scene: scene_ch4_station_end_no_quest

  - id: scene_ch4_station_end_no_quest
    location_id: loc_station_end
    background: backgrounds/akabane.jpg
    bgm: audio/bgm/station.mp3
    messages:
      - text: 駅の端。ホームの隅で、電車が遠ざかっていく。
        voice_character_id: char_hero
    next_scene: null

  - id: scene_church_default
    location_id: loc_church
    background: backgrounds/coderdojo.jpg
    bgm: audio/bgm/danchi.mp3
    messages: []
    talkable:
      - character_id: char_priest
        scene_id: scene_ch4_priest
    branches:
      type: auto
      choices:
        - condition:
            has_item: item_gummy_5
          next_scene: null
        - condition:
            flag: flag_ch4_gummy_quest
            value: true
          next_scene: null
        - condition: null
          next_scene: scene_ch4_church_no_quest

  - id: scene_ch4_church_no_quest
    location_id: loc_church
    background: backgrounds/coderdojo.jpg
    bgm: audio/bgm/danchi.mp3
    messages:
      - text: 教会。静かで落ち着いた空気が流れている。
        voice_character_id: char_hero
    next_scene: null

  # ============================================================
  # グミ①　坂の大学生
  # ============================================================
  - id: scene_ch4_slope_college
    location_id: loc_slope
    background: backgrounds/slope_day.jpg
    bgm: audio/bgm/danchi.mp3
    characters:
      - character_id: char_college_student
        position: center
        expression: normal
    messages: []
    branches:
      type: auto
      choices:
        - condition:
            has_item: item_gummy_1
          next_scene: scene_ch4_slope_college_repeat
        - condition: null
          next_scene: scene_ch4_slope_college_first

  - id: scene_ch4_slope_college_first
    location_id: loc_slope
    background: backgrounds/slope_day.jpg
    bgm: audio/bgm/danchi.mp3
    flags_set:
      - flag: flag_ch4_gummy_quest
        value: true
    characters:
      - character_id: char_college_student
        position: center
        expression: normal
    item_give:
      - item_id: item_gummy_1
        condition: null
    messages:
      - text: 「あ、こんにちは！　散歩ですか？」
        voice_character_id: char_college_student
      - text: 「うん。特に用事もないから、ぶらぶらしてて」
        voice_character_id: char_hero
      - text: 「そういえば、ちょっと面白い話、知ってますか？」
        voice_character_id: char_college_student
      - text: 「面白い話？」
        voice_character_id: char_hero
      - text: 「この赤羽には昔から伝わる言い伝えがあって……七つのグミを集めると、願いが叶うって言うんですよ」
        voice_character_id: char_college_student
      - text: 「七つのグミ……」
        voice_character_id: char_hero
      - text: 「ほら、これ。僕が持ってたグミのひとつ。よかったら最初の一個、どうぞ」
        voice_character_id: char_college_student
      - text: ケンの頭に、おばちゃんの顔が浮かんだ。
        voice_character_id: null
      - text: （おばちゃんの膝が治るように……七つ集めてみよう）
        voice_character_id: char_hero
    next_scene: null

  - id: scene_ch4_slope_college_repeat
    location_id: loc_slope
    background: backgrounds/slope_day.jpg
    bgm: audio/bgm/danchi.mp3
    characters:
      - character_id: char_college_student
        position: center
        expression: normal
    messages: []
    talkable:
      - character_id: char_college_student
        scene_id: scene_ch4_slope_college_clue
    branches:
      type: auto
      choices:
        - condition:
            flag: flag_ch4_detective_clue1
            value: true
          next_scene: null
        - condition: null
          next_scene: null

  - id: scene_ch4_slope_college_clue
    location_id: loc_slope
    background: backgrounds/slope_day.jpg
    bgm: audio/bgm/danchi.mp3
    flags_set:
      - flag: flag_ch4_detective_clue1
        value: true
    characters:
      - character_id: char_college_student
        position: center
        expression: normal
    messages:
      - text: 「グミ集めてるんですね！　そういえば、さっきここで小さな子猫を見かけましたよ」
        voice_character_id: char_college_student
      - text: 「子猫？」
        voice_character_id: char_hero
      - text: 「駅の端の方から来て、ベンチの下に入ってったんです。なんか口に何か咥えてて」
        voice_character_id: char_college_student
      - text: 「ふーん……」
        voice_character_id: char_hero
    next_scene: null

  # ============================================================
  # グミ②　梅の木公園・アメ好きっ子
  # ============================================================
  - id: scene_ch4_plum_park_talk
    location_id: loc_plum_park
    background: backgrounds/danchimae.jpg
    bgm: audio/bgm/danchi.mp3
    characters:
      - character_id: char_candy_kid
        position: center
        expression: normal
    messages: []
    branches:
      type: auto
      choices:
        - condition:
            has_item: item_gummy_2
          next_scene: scene_ch4_plum_park_done
        - condition:
            has_item: item_candy
          next_scene: scene_ch4_plum_park_trade
        - condition: null
          next_scene: scene_ch4_plum_park_no_candy

  - id: scene_ch4_plum_park_trade
    location_id: loc_plum_park
    background: backgrounds/danchimae.jpg
    bgm: audio/bgm/danchi.mp3
    flags_set:
      - flag: flag_ch4_detective_clue3
        value: true
    characters:
      - character_id: char_candy_kid
        position: center
        expression: normal
    item_give:
      - item_id: item_gummy_2
        condition: null
    item_remove:
      - item_candy
    messages:
      - text: 「あ、ケン兄ちゃん！　グミ集めてるって聞いたよ！」
        voice_character_id: char_candy_kid
      - text: 「え、もう知ってるの？」
        voice_character_id: char_hero
      - text: 「おばちゃんから聞いた！　ぼくんちにグミあるよ！　アメちゃんと交換して！」
        voice_character_id: char_candy_kid
      - text: 「……いいよ。じゃあこれ」
        voice_character_id: char_hero
      - text: アメちゃんをひとつ渡すと、少年は嬉しそうにグミをくれた。
        voice_character_id: null
      - text: 「そうだ、さっきここの梅の木の下に子猫いたよ！　なんか光ってるもの咥えてた！」
        voice_character_id: char_candy_kid
      - text: 「子猫が光るものを……？」
        voice_character_id: char_hero
    next_scene: null

  - id: scene_ch4_plum_park_no_candy
    location_id: loc_plum_park
    background: backgrounds/danchimae.jpg
    bgm: audio/bgm/danchi.mp3
    characters:
      - character_id: char_candy_kid
        position: center
        expression: normal
    messages:
      - text: 「ケン兄ちゃん！　グミ欲しかったらアメちゃんと交換してよ！」
        voice_character_id: char_candy_kid
      - text: 「アメちゃんか……今は持ってないな」
        voice_character_id: char_hero
      - text: 「じゃあ持ってきたらまた来てよ！　待ってるから！」
        voice_character_id: char_candy_kid
    next_scene: null

  - id: scene_ch4_plum_park_done
    location_id: loc_plum_park
    background: backgrounds/danchimae.jpg
    bgm: audio/bgm/danchi.mp3
    characters:
      - character_id: char_candy_kid
        position: center
        expression: normal
    messages:
      - text: 「グミ、ちゃんと持ってる？ 全部集めてね！」
        voice_character_id: char_candy_kid
    next_scene: null

  # ============================================================
  # グミ③　ミュージアム・神経衰弱
  # ============================================================
  - id: scene_ch4_museum_staff
    location_id: loc_museum
    background: backgrounds/coderdojo.jpg
    bgm: audio/bgm/danchi.mp3
    characters:
      - character_id: char_museum_staff
        position: center
        expression: normal
    messages: []
    branches:
      type: auto
      choices:
        - condition:
            has_item: item_gummy_3
          next_scene: scene_ch4_museum_done
        - condition: null
          next_scene: scene_ch4_museum_challenge

  - id: scene_ch4_museum_challenge
    location_id: loc_museum
    background: backgrounds/coderdojo.jpg
    bgm: audio/bgm/danchi.mp3
    characters:
      - character_id: char_museum_staff
        position: center
        expression: talking
    messages:
      - text: 「ふはは……来たな、グミを求める者よ」
        voice_character_id: char_museum_staff
      - text: 「え、知ってるの？」
        voice_character_id: char_hero
      - text: 「我が秘蔵のグミ、欲しくば勝負せよ……神経衰弱の一騎打ちだ！」
        voice_character_id: char_museum_staff
      - text: 「わかった。やってみる」
        voice_character_id: char_hero
    next_engine:
      id: memory_game
      config:
        stageId: ch4_museum_duel
        mode: duel
        pairs: 6
        opponentCharacterId: char_museum_staff
        playerCharacterId: char_hero
        opponentDialogue:
          - "くっくっく……"
          - "読めている……"
          - "ふふふ……"
        opponentMatchDialogue:
          - "見えていたわ！"
          - "これも我の記憶力よ"
        opponentMissDialogue:
          - "ぐ……！　まぐれじゃ"
          - "これは計算のうち"
        playerMatchDialogue:
          - "やった！"
          - "そろった！"
        playerMissDialogue:
          - "あれ……"
          - "うーん……"
      return_scene: scene_ch4_museum_result

  - id: scene_ch4_museum_result
    location_id: loc_museum
    background: backgrounds/coderdojo.jpg
    bgm: audio/bgm/danchi.mp3
    messages: []
    branches:
      type: auto
      choices:
        - condition:
            flag: memory_game_result_ch4_museum_duel
            value: win
          next_scene: scene_ch4_museum_win
        - condition: null
          next_scene: scene_ch4_museum_lose

  - id: scene_ch4_museum_win
    location_id: loc_museum
    background: backgrounds/coderdojo.jpg
    bgm: audio/bgm/danchi.mp3
    flags_set:
      - flag: flag_ch4_museum_duel_won
        value: true
    characters:
      - character_id: char_museum_staff
        position: center
        expression: talking
    item_give:
      - item_id: item_gummy_3
        condition: null
    messages:
      - text: 「ぐ……！　我としたことが……」
        voice_character_id: char_museum_staff
      - text: 「……約束どおり、このグミを渡そう。まあ……見どころのある者じゃ」
        voice_character_id: char_museum_staff
      - text: グミを受け取った。
        voice_character_id: null
    next_scene: null

  - id: scene_ch4_museum_lose
    location_id: loc_museum
    background: backgrounds/coderdojo.jpg
    bgm: audio/bgm/danchi.mp3
    characters:
      - character_id: char_museum_staff
        position: center
        expression: normal
    messages:
      - text: 「くっくっく……我の勝ちじゃ。まだ修行が足りぬな」
        voice_character_id: char_museum_staff
      - text: 「……もう一回！」
        voice_character_id: char_hero
    next_scene: scene_ch4_museum_challenge

  - id: scene_ch4_museum_done
    location_id: loc_museum
    background: backgrounds/coderdojo.jpg
    bgm: audio/bgm/danchi.mp3
    characters:
      - character_id: char_museum_staff
        position: center
        expression: normal
    messages:
      - text: 「残り少ないな、グミ集め。……健闘を祈る」
        voice_character_id: char_museum_staff
    next_scene: null

  # ============================================================
  # グミ④　駅の端・探偵おやじ（謎解き）
  # ============================================================
  - id: scene_ch4_detective
    location_id: loc_station_end
    background: backgrounds/akabane.jpg
    bgm: audio/bgm/station.mp3
    characters:
      - character_id: char_detective
        position: center
        expression: normal
    messages: []
    branches:
      type: auto
      choices:
        - condition:
            has_item: item_gummy_4
          next_scene: scene_ch4_detective_done
        - condition:
            flag: flag_ch4_detective_solved
            value: true
          next_scene: scene_ch4_detective_done
        - condition:
            and:
              - flag: flag_ch4_detective_clue1
                value: true
              - flag: flag_ch4_detective_clue2
                value: true
              - flag: flag_ch4_detective_clue3
                value: true
          next_scene: scene_ch4_detective_choice
        - condition:
            flag: flag_ch4_met_detective
            value: true
          next_scene: scene_ch4_detective_wait
        - condition: null
          next_scene: scene_ch4_detective_intro

  - id: scene_ch4_detective_intro
    location_id: loc_station_end
    background: backgrounds/akabane.jpg
    bgm: audio/bgm/station.mp3
    flags_set:
      - flag: flag_ch4_met_detective
        value: true
    characters:
      - character_id: char_detective
        position: center
        expression: normal
    messages:
      - text: ホームの端に、コートを着た中年男性が立っていた。
        voice_character_id: null
      - text: 「……おや、君。探偵のわしに用かね」
        voice_character_id: char_detective
      - text: 「え、探偵さん？」
        voice_character_id: char_hero
      - text: 「そうじゃ。赤羽の探偵、と呼んでくれ。実は今、困ったことがあってな」
        voice_character_id: char_detective
      - text: 「わしのロケットペンダント、さっきここのベンチで子猫に取られてしもうたんじゃ。大事な形見でな」
        voice_character_id: char_detective
      - text: 「子猫が……ペンダントを？」
        voice_character_id: char_hero
      - text: 「そうじゃ。赤羽のどこかに逃げたはずじゃが……情報を集めて、どこへ行ったか突き止めてくれんかね。協力してくれたら礼をするぞ」
        voice_character_id: char_detective
      - text: 「わかりました。調べてみます」
        voice_character_id: char_hero
    next_scene: null

  - id: scene_ch4_detective_wait
    location_id: loc_station_end
    background: backgrounds/akabane.jpg
    bgm: audio/bgm/station.mp3
    characters:
      - character_id: char_detective
        position: center
        expression: normal
    messages:
      - text: 「どうじゃ、何か分かったかね」
        voice_character_id: char_detective
      - text: 「まだ集めてる途中です」
        voice_character_id: char_hero
      - text: 「急ぐことはない。じっくり調べてくれ」
        voice_character_id: char_detective
    next_scene: null

  - id: scene_ch4_detective_choice
    location_id: loc_station_end
    background: backgrounds/akabane.jpg
    bgm: audio/bgm/station.mp3
    characters:
      - character_id: char_detective
        position: center
        expression: talking
    messages:
      - text: 「おや、戻ってきたか。どこへ行ったか分かったかね」
        voice_character_id: char_detective
      - text: 「えーと……」
        voice_character_id: char_hero
    branches:
      type: choice
      choices:
        - label: 「坂道の方に逃げました」
          next_scene: scene_ch4_detective_wrong
        - label: 「梅の木公園の梅の木の下にいます」
          next_scene: scene_ch4_detective_correct
        - label: 「アーケード街の方に走っていきました」
          next_scene: scene_ch4_detective_wrong

  - id: scene_ch4_detective_correct
    location_id: loc_station_end
    background: backgrounds/akabane.jpg
    bgm: audio/bgm/station.mp3
    flags_set:
      - flag: flag_ch4_detective_solved
        value: true
    characters:
      - character_id: char_detective
        position: center
        expression: talking
    item_give:
      - item_id: item_gummy_4
        condition: null
    messages:
      - text: 「梅の木公園の梅の木の下……！　確かにあの子猫は梅が好きでな。そこで間違いない！」
        voice_character_id: char_detective
      - text: 探偵おやじは颯爽と走り出した。しばらくして、嬉しそうに戻ってきた。
        voice_character_id: null
      - text: 「見つかった！　本当にありがとう。約束のものじゃ」
        voice_character_id: char_detective
      - text: 探偵はポケットからグミをひとつ取り出して渡してくれた。
        voice_character_id: null
    next_scene: null

  - id: scene_ch4_detective_wrong
    location_id: loc_station_end
    background: backgrounds/akabane.jpg
    bgm: audio/bgm/station.mp3
    characters:
      - character_id: char_detective
        position: center
        expression: normal
    messages:
      - text: 「うーむ……そこは違うようじゃな。もう少し調べてきてくれ」
        voice_character_id: char_detective
    next_scene: null

  - id: scene_ch4_detective_done
    location_id: loc_station_end
    background: backgrounds/akabane.jpg
    bgm: audio/bgm/station.mp3
    characters:
      - character_id: char_detective
        position: center
        expression: normal
    messages:
      - text: 「ペンダントも無事戻った。本当に助かったよ、ありがとう」
        voice_character_id: char_detective
    next_scene: null

  # おばちゃんの手がかり（探偵依頼 clue2）
  - id: scene_ch4_talk_obachan
    location_id: loc_danchi
    background: backgrounds/danchimae.jpg
    bgm: audio/bgm/danchi.mp3
    characters:
      - character_id: char_obachan
        position: left
        expression: normal
    messages: []
    branches:
      type: auto
      choices:
        - condition:
            and:
              - flag: flag_ch4_met_detective
                value: true
              - flag: flag_ch4_detective_clue2
                value: false
          next_scene: scene_ch4_obachan_clue2
        - condition: null
          next_scene: scene_ch4_obachan_chat

  - id: scene_ch4_obachan_clue2
    location_id: loc_danchi
    background: backgrounds/danchimae.jpg
    bgm: audio/bgm/danchi.mp3
    flags_set:
      - flag: flag_ch4_detective_clue2
        value: true
    characters:
      - character_id: char_obachan
        position: left
        expression: talking
    messages:
      - text: 「ケンちゃん、グミ集めてるんだって？　がんばってるねえ」
        voice_character_id: char_obachan
      - text: 「うん。あ、おばちゃん、さっき子猫見た？」
        voice_character_id: char_hero
      - text: 「子猫？　ああ、さっきこのベンチの下に入ってたよ。何かキラキラしたもの咥えてたねえ」
        voice_character_id: char_obachan
      - text: 「ベンチの下に……じゃあ梅の木公園のベンチかな」
        voice_character_id: char_hero
    next_scene: null

  - id: scene_ch4_obachan_chat
    location_id: loc_danchi
    background: backgrounds/danchimae.jpg
    bgm: audio/bgm/danchi.mp3
    characters:
      - character_id: char_obachan
        position: left
        expression: normal
    messages:
      - text: 「ケンちゃん、がんばってるね。応援してるよ」
        voice_character_id: char_obachan
    next_scene: null

  # ============================================================
  # グミ⑤　教会・神父さん
  # ============================================================
  - id: scene_ch4_priest
    location_id: loc_church
    background: backgrounds/coderdojo.jpg
    bgm: audio/bgm/danchi.mp3
    characters:
      - character_id: char_priest
        position: center
        expression: normal
    messages: []
    branches:
      type: auto
      choices:
        - condition:
            has_item: item_gummy_5
          next_scene: scene_ch4_priest_done
        - condition:
            flag: flag_ch4_priest_talked
            value: true
          next_scene: scene_ch4_priest_give
        - condition: null
          next_scene: scene_ch4_priest_first

  - id: scene_ch4_priest_first
    location_id: loc_church
    background: backgrounds/coderdojo.jpg
    bgm: audio/bgm/danchi.mp3
    flags_set:
      - flag: flag_ch4_priest_talked
        value: true
    characters:
      - character_id: char_priest
        position: center
        expression: normal
    messages:
      - text: 「いらっしゃい。何かお探しですか」
        voice_character_id: char_priest
      - text: 「あの……グミを集めてるんです。おばあちゃんの膝が治るように願いを叶えたくて」
        voice_character_id: char_hero
      - text: 「……なんと純粋な願い」
        voice_character_id: char_priest
      - text: 「純粋に誰かの幸せを願う心は、神様も聞いてくださいますよ」
        voice_character_id: char_priest
      - text: 「ありがとうございます」
        voice_character_id: char_hero
      - text: 「少し待っていてください」
        voice_character_id: char_priest
      - text: 神父は奥に入り、しばらくして小さな瓶に入ったグミを持ってきた。
        voice_character_id: null
      - text: 「これは以前、ある方から預かったものです。今、あなたに渡す時が来たようです」
        voice_character_id: char_priest
    next_scene: scene_ch4_priest_give

  - id: scene_ch4_priest_give
    location_id: loc_church
    background: backgrounds/coderdojo.jpg
    bgm: audio/bgm/danchi.mp3
    characters:
      - character_id: char_priest
        position: center
        expression: normal
    item_give:
      - item_id: item_gummy_5
        condition: null
    messages:
      - text: 神父さんからグミを受け取った。
        voice_character_id: null
    next_scene: null

  - id: scene_ch4_priest_done
    location_id: loc_church
    background: backgrounds/coderdojo.jpg
    bgm: audio/bgm/danchi.mp3
    characters:
      - character_id: char_priest
        position: center
        expression: normal
    messages:
      - text: 「どうかその願い、届きますように」
        voice_character_id: char_priest
    next_scene: null

  # ============================================================
  # グミ⑥　一番街・おじさんの迷路チャレンジ
  # ============================================================
  - id: scene_ch4_arcade_oyaji
    location_id: loc_arcade
    background: backgrounds/archade.jpg
    bgm: audio/bgm/station.mp3
    characters:
      - character_id: char_oyaji
        position: center
        expression: normal
    messages: []
    branches:
      type: auto
      choices:
        - condition:
            has_item: item_gummy_6
          next_scene: scene_ch4_arcade_done
        - condition: null
          next_scene: scene_ch4_arcade_challenge

  - id: scene_ch4_arcade_challenge
    location_id: loc_arcade
    background: backgrounds/archade.jpg
    bgm: audio/bgm/station.mp3
    characters:
      - character_id: char_oyaji
        position: center
        expression: talking
    messages:
      - text: 「おう、ケンちゃん。グミ集めてるって話、聞いたぞ」
        voice_character_id: char_oyaji
      - text: 「おじさんも知ってるんですか」
        voice_character_id: char_hero
      - text: 「ああ。わしも昔、七つのグミで願いを叶えようとしたもんじゃ。……まあ、叶わなかったけどな」
        voice_character_id: char_oyaji
      - text: 「え……大丈夫でしたか？」
        voice_character_id: char_hero
      - text: 「ガハハ、大丈夫大丈夫。グミが足りなかっただけじゃよ。ひとつ持ってるから、これをやろう」
        voice_character_id: char_oyaji
      - text: 「ただし、この迷路をクリアできたらな！」
        voice_character_id: char_oyaji
      - text: おじさんは一番街の奥を指さした。
        voice_character_id: null
    next_engine:
      id: maze_rpg
      config:
        map: dungeon_01
        name: "おじさんの迷路チャレンジ"
        bgm: audio/bgm/dungeon.mp3
      return_scene: scene_ch4_arcade_maze_result

  - id: scene_ch4_arcade_maze_result
    location_id: loc_arcade
    background: backgrounds/archade.jpg
    bgm: audio/bgm/station.mp3
    characters:
      - character_id: char_oyaji
        position: center
        expression: normal
    item_give:
      - item_id: item_gummy_6
        condition: null
    messages:
      - text: 「クリアしたか！　やるじゃないか」
        voice_character_id: char_oyaji
      - text: 「約束のグミじゃ。しっかり使えよ」
        voice_character_id: char_oyaji
      - text: グミを受け取った。
        voice_character_id: null
    next_scene: null

  - id: scene_ch4_arcade_done
    location_id: loc_arcade
    background: backgrounds/archade.jpg
    bgm: audio/bgm/station.mp3
    characters:
      - character_id: char_oyaji
        position: center
        expression: normal
    messages:
      - text: 「残りもがんばれよ。応援してるぞ」
        voice_character_id: char_oyaji
    next_scene: null

  # ============================================================
  # 6個集まったら→おばちゃんへヒント
  # ============================================================
  - id: scene_ch4_hint_seven
    location_id: loc_danchi
    background: backgrounds/danchimae.jpg
    bgm: audio/bgm/danchi.mp3
    characters:
      - character_id: char_hero
        position: center
        expression: normal
    messages:
      - text: あと一個……どこにあるんだろう。
        voice_character_id: char_hero
      - text: 伝説では、七つ目のグミは「一番身近な人が持っている」と言われているらしい。
        voice_character_id: null
      - text: （一番身近な人……）
        voice_character_id: char_hero
    next_scene: null

  # ============================================================
  # グミ⑦　おばちゃん（感動のラスト）
  # ============================================================
  - id: scene_ch4_obachan_last
    location_id: loc_danchi
    background: backgrounds/danchimae.jpg
    bgm: audio/bgm/danchi.mp3
    characters:
      - character_id: char_obachan
        position: left
        expression: normal
      - character_id: char_hero
        position: right
        expression: normal
    item_give:
      - item_id: item_gummy_7
        condition: null
    messages:
      - text: 「おばちゃん、あのさ……」
        voice_character_id: char_hero
      - text: 「どうしたんだい、ケンちゃん。真剣な顔して」
        voice_character_id: char_obachan
      - text: 「七つのグミ、あと一個で揃うんだけど……七つ目は一番身近な人が持ってるって」
        voice_character_id: char_hero
      - text: おばちゃんはしばらくじっとケンを見ていた。それから、ゆっくりとポケットに手を入れた。
        voice_character_id: null
      - text: 「……あらまあ」
        voice_character_id: char_obachan
      - text: 「え……！」
        voice_character_id: char_hero
      - text: 「ずっとここにあったよ。なんとなく、ずっと持ってたんだよ、このグミ」
        voice_character_id: char_obachan
      - text: おばちゃんは、皺くちゃな手のひらにグミをひとつ乗せて差し出した。
        voice_character_id: null
      - text: 「どうぞ」
        voice_character_id: char_obachan
      - text: ケンの目が熱くなった。
        voice_character_id: char_hero
    next_scene: scene_ch4_wish

  # ============================================================
  # 全グミ揃った→願いをかける
  # ============================================================
  - id: scene_ch4_wish
    location_id: loc_danchi
    background: backgrounds/danchimae.jpg
    bgm: audio/bgm/danchi.mp3
    messages: []
    branches:
      type: auto
      choices:
        - condition:
            has_item: item_gummy_7
          next_scene: scene_ch4_wish_ceremony
        - condition: null
          next_scene: scene_ch4_obachan_last

  - id: scene_ch4_wish_ceremony
    location_id: loc_danchi
    background: backgrounds/danchimae.jpg
    bgm: audio/bgm/danchi.mp3
    characters:
      - character_id: char_obachan
        position: left
        expression: normal
      - character_id: char_hero
        position: right
        expression: normal
    messages:
      - text: 七つのグミが揃った。
        voice_character_id: null
      - text: 「おばちゃん。おばちゃんの膝が治りますように、ってお願いしてもいい？」
        voice_character_id: char_hero
      - text: 「……ケンちゃん」
        voice_character_id: char_obachan
      - text: 「ずっと思ってたんだ。来年もおばちゃんとアメちゃん大会に出たくて」
        voice_character_id: char_hero
      - text: おばちゃんは目をうるませて、それからふっと笑った。
        voice_character_id: null
      - text: 「……ありがとう、ケンちゃん。お願いしていいよ」
        voice_character_id: char_obachan
      - text: ケンはそっと目を閉じて、七つのグミを手のひらで包んだ。
        voice_character_id: null
    next_scene: scene_ch4_ending

  # ============================================================
  # エンディング
  # ============================================================
  - id: scene_ch4_ending
    location_id: loc_danchi
    background: backgrounds/danchimae.jpg
    bgm: audio/bgm/danchi.mp3
    ending_title: "第4章　七つのグミ"
    flags_set:
      - flag: flag_ch4_cleared
        value: true
    messages:
      - text: 五月の風が、団地の広場を静かに吹き抜けていった。
        voice_character_id: null
      - text: 願いが叶うかどうかは、誰にもわからない。
        voice_character_id: null
      - text: でも今この瞬間、ケンはそれよりも大切なことに気づいていた。
        voice_character_id: null
      - text: 赤羽のひとたちが、みんなで一緒にいてくれたこと。
        voice_character_id: null
    game_end: true
